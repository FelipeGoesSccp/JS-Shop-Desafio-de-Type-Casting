<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Calculadora de Pedidos</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; }
        .form-group { margin-bottom: 10px; }
        .form-group label { display: block; font-weight: bold; }
        .form-group input, .form-group select { width: 100%; padding: 8px; box-sizing: border-box; }
        .btn-calc { background: #007BFF; color: white; padding: 10px; border: none; cursor: pointer; width: 100%; font-size: 16px; margin-bottom: 20px; }
        #resultado { padding: 15px; border: 1px solid #ccc; margin-top: 10px; border-radius: 5px; background-color: #f9f9f9; }
        .erro { color: #d9534f; font-weight: bold; }
        .sucesso { color: #5cb85c; font-weight: bold; }
    </style>
</head>
<body>

    <h2>Calculadora de Pedido</h2>

    <div class="form-group">
        <label>Preço Unitário (R$):</label>
        <input type="text" id="precoInput" placeholder="Ex: 50.00">
    </div>

    <div class="form-group">
        <label>Quantidade:</label>
        <input type="text" id="qtdInput" placeholder="Ex: 2">
    </div>

    <div class="form-group">
        <label>Cupom de Desconto (10%):</label>
        <select id="cupomSelect">
            <option value="false">Desativado</option>
            <option value="true">Ativado</option>
        </select>
    </div>

    <button class="btn-calc" onclick="calcularTotal()">Calcular</button>

    <div id="resultado">Aguardando cálculo...</div>

    <script>
        function calcularTotal() {
            const precoString = document.getElementById('precoInput').value;
            const qtdString = document.getElementById('qtdInput').value;
            const cupomString = document.getElementById('cupomSelect').value;

            //parseFloat e parseInt para converter as strings em números, com base 10 para quantidade
            const preco = parseFloat(precoString); 
            const qtd = parseInt(qtdString, 10);   
            
            const temDesconto = (cupomString === "true");

            const divResultado = document.getElementById('resultado');

            //number.isNaN para verificar se os valores convertidos são realmente números, evitando erros de cálculo
            if (Number.isNaN(preco) || Number.isNaN(qtd)) {
                console.error("Erro no cálculo: Foi detectado um valor NaN (letras em campo numérico).");
                divResultado.innerHTML = `<span class="erro">Erro: Valores inválidos. Por favor, insira apenas números.</span>`;
                return; 
            }

            let total = preco * qtd;

            if (temDesconto) {
                total = total * 0.90;
                console.log("Desconto de 10% aplicado com sucesso.");
            }

            divResultado.innerHTML = `<span class="sucesso">Sucesso! O total calculado é R$ ${total.toFixed(2)}</span>`;
            console.log(`Cálculo finalizado: Preço: ${preco}, Qtd: ${qtd} -> Total: R$ ${total.toFixed(2)}`);
        }
    </script>
</body>
</html>
